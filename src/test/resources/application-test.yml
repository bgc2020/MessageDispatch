# Test Configuration
server:
  port: 0  # Random port for testing

spring:
  application:
    name: message-dispatch-test
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 

websocket:
  max-connections: 1000
  heartbeat-interval: 10000
  connection-timeout: 30000

message:
  dispatch:
    thread-pool-size: 10
    queue-capacity: 100
    retry-attempts: 2
    retry-delay: 100

redis:
  pubsub:
    channels:
      broadcast: "test:message:broadcast"
      unicast: "test:message:unicast"
      system: "test:message:system"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.messagedispatch: DEBUG
