version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: message-dispatch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - message-dispatch-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: message-dispatch-app
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JAVA_OPTS=-Xms2g -Xmx2g -XX:+UseG1GC
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - message-dispatch-network

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: message-dispatch-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - app
    networks:
      - message-dispatch-network

  grafana:
    image: grafana/grafana:10.2.2
    container_name: message-dispatch-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - message-dispatch-network

volumes:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  message-dispatch-network:
    driver: bridge
